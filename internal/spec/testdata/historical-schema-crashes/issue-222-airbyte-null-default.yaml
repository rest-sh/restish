openapi: "3.1.0"
info:
  title: Issue 222 Airbyte Regression
  version: "1.0.0"
paths:
  /health:
    get:
      operationId: getHealthCheck
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckRead"
components:
  schemas:
    HealthCheckRead:
      type: object
      properties:
        available:
          type: boolean
        actor:
          $ref: "#/components/schemas/ActorDefinitionRead"
    ActorDefinitionRead:
      type: object
      properties:
        actorDefinitionId:
          type: string
          format: uuid
        name:
          type: string
        defaultVersionId:
          type: string
          format: uuid
          nullable: true
          default: null
