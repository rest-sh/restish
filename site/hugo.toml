baseURL = "https://rest.sh/"
title = "Restish"
enableRobotsTXT = true
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableGitInfo = true

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-US"
    contentDir = "content/en"
    weight = 1

[module]
  [[module.imports]]
    path = "github.com/google/docsy"
  [[module.imports]]
    path = "github.com/FortAwesome/Font-Awesome"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    guessSyntax = true
    noClasses = false

[params]
  copyright = "Restish"
  github_repo = "https://github.com/rest-sh/restish"
  github_project_repo = "https://github.com/rest-sh/restish"
  offlineSearch = true
  prism_syntax_highlighting = true
  version_menu = "Releases"

  [params.ui]
    navbar_logo = true
    sidebar_menu_compact = false
    breadcrumb_disable = false
    sidebar_search_disable = false
    showLightDarkModeMenu = true
    feedback = { enable = false }

  [params.links]
    [[params.links.user]]
      name = "GitHub"
      url = "https://github.com/rest-sh/restish"
      icon = "fab fa-github"
      desc = "Restish source code and issue tracker"

[outputs]
  home = ["HTML", "RSS"]

[taxonomies]
  category = "categories"
  tag = "tags"

[menu]
  [[menu.main]]
    name = "Getting Started"
    url = "/docs/getting-started/install/"
    weight = 20
  [[menu.main]]
    name = "Guides"
    url = "/docs/guides/"
    weight = 30
  [[menu.main]]
    name = "Plugins"
    url = "/docs/plugins/"
    weight = 40
  [[menu.main]]
    name = "Reference"
    url = "/docs/reference/"
    weight = 45
  [[menu.main]]
    name = "Recipes"
    url = "/docs/recipes/"
    weight = 47
  [[menu.main]]
    name = "GitHub"
    url = "https://github.com/rest-sh/restish"
    weight = 50
